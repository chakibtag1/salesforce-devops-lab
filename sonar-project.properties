# SonarCloud Configuration for Salesforce DevOps Lab
# Organization and Project keys
sonar.organization=chakibtag1
sonar.projectKey=chakibtag1_salesforce-devops-lab

# Project metadata
sonar.projectName=Salesforce DevOps Lab
sonar.projectVersion=1.0

# Source code location
sonar.sources=salesforce-devops-lab/force-app/main/default/classes
sonar.tests=salesforce-devops-lab/force-app/main/default/classes

# Test file patterns
sonar.test.inclusions=**/*Test.cls
sonar.exclusions=**/*-meta.xml,**/package.xml

# Language
sonar.language=apex

# Source encoding
sonar.sourceEncoding=UTF-8

# Code coverage (will be generated by Salesforce CLI)
sonar.apex.coverage.reportPath=salesforce-devops-lab/test-results/test-result-codecoverage.json
