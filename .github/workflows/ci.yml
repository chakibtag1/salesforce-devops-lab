name: CI - Deploy to Dev Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salesforce-devops-lab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour SonarCloud (analyse historique)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf version

      - name: Authenticate Dev Hub (JWT)
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID_DEV }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME_DEV }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL_DEV }} \
            --alias devhub \
            --set-default-dev-hub

      - name: Verify Authentication
        run: sf org display --target-org devhub

      # ✅ VALIDATION AVEC TESTS
      - name: Validate deployment with tests
        id: validate
        run: |
          echo "🧪 Validation du déploiement avec exécution des tests..."
          sf project deploy validate \
            --target-org devhub \
            --source-dir force-app \
            --test-level RunLocalTests \
            --coverage-formatters json-summary \
            --results-dir test-results \
            --wait 10
        continue-on-error: false

      # 🔍 ANALYSE SONARCLOUD
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 📊 Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-test-results
          path: salesforce-devops-lab/test-results/
          retention-days: 7

      # 🚀 DÉPLOIEMENT (uniquement si validation + SonarCloud OK)
      - name: Deploy to Dev Hub
        if: success()
        run: |
          echo "🚀 Déploiement vers Dev Hub..."
          sf project deploy start \
            --target-org devhub \
            --source-dir force-app \
            --wait 10

      # 🎉 Success message
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Déploiement réussi !"
          echo "📊 Qualité validée par SonarCloud"
          echo "🧪 Tous les tests sont passés"

      # 🧹 Cleanup
      - name: Clean up key file
        if: always()
        run: rm -f server.key
