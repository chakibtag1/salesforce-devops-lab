name: CI - Validate on Dev Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salesforce-devops-lab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Dev Hub (JWT)
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID_DEV }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME_DEV }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL_DEV }} \
            --alias devhub \
            --set-default-dev-hub

      - name: Verify Authentication
        run: sf org display --target-org devhub

      - name: Deploy to Dev Hub (validation only)
        run: |
          sf project deploy validate \
            --target-org devhub \
            --source-dir force-app \
            --test-level RunLocalTests

      - name: Clean up key file
        if: always()
        run: rm -f server.key
