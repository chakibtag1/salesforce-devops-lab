name: CI - Deploy to Dev Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salesforce-devops-lab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf version

      - name: Authenticate Dev Hub (JWT)
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID_DEV }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME_DEV }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL_DEV }} \
            --alias devhub \
            --set-default-dev-hub

      - name: Verify Authentication
        run: sf org display --target-org devhub

      # ✅ ÉTAPE 1 : VALIDATION AVEC TESTS (AVANT DÉPLOIEMENT)
      - name: Validate deployment with tests
        id: validate
        run: |
          echo "🧪 Validation du déploiement avec exécution des tests..."
          sf project deploy validate \
            --target-org devhub \
            --source-dir force-app \
            --test-level RunLocalTests \
            --coverage-formatters text \
            --results-dir test-results \
            --wait 10
        continue-on-error: false

      # 📊 Upload des résultats de tests (même si échec)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-test-results
          path: salesforce-devops-lab/test-results/
          retention-days: 7

      # ✅ ÉTAPE 2 : DÉPLOIEMENT (UNIQUEMENT SI VALIDATION OK)
      - name: Deploy to Dev Hub
        if: success()
        run: |
          echo "🚀 Déploiement vers Dev Hub..."
          sf project deploy start \
            --target-org devhub \
            --source-dir force-app \
            --wait 10

      # 🎉 Succès complet
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Déploiement réussi !"
          echo "📊 Les tests ont été validés avant déploiement"
          sf org display --target-org devhub

      # 🧹 Nettoyage (toujours exécuté)
      - name: Clean up key file
        if: always()
        run: rm -f server.key